<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emoji Picker</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="splash.css" />
</head>
<body>
  <div id="picker">
    <div id="header">
      <input
        id="search-input"
        type="text"
        placeholder="Search emoji…"
        autocomplete="off"
        spellcheck="false"
      />
      <div id="skin-tone-wrapper">
        <button id="skin-tone-btn" title="Skin tone"></button>
        <div id="skin-tone-menu" class="hidden"></div>
      </div>
    </div>

    <div id="category-bar"></div>

    <div id="emoji-grid" tabindex="0"></div>

    <div id="preview"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
